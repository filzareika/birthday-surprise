<script>
  let currentPage = 1;
  const totalPages = 12;

  const music = document.getElementById("bgMusic");
  let musicStarted = false;

  function showPage(pageNumber) {
    for (let i = 1; i <= totalPages; i++) {
      document.getElementById("page" + i).classList.remove("active");
    }

    document.getElementById("page" + pageNumber).classList.add("active");

    handleMusicByPage(pageNumber);
  }

  function handleMusicByPage(pageNumber) {
    const video = document.getElementById("birthdayVideo");

    if (pageNumber === 8) {
      music.pause();
      if (video) {
        video.currentTime = 0;
        video.play().catch(() => {});
      }
    } else {
      if (video) {
        video.pause();
      }
      if (musicStarted) {
        music.play().catch(() => {});
      }
    }
  }

  function startMusicOnce() {
    if (!musicStarted) {
      musicStarted = true;
      music.play().catch(() => {});
    }
  }

  function nextPage() {
    startMusicOnce();
    if (currentPage < totalPages) {
      currentPage++;
      showPage(currentPage);
    }
  }

  function prevPage() {
    if (currentPage > 1) {
      currentPage--;
      showPage(currentPage);
    }
  }

  function saveNameAndNext() {
    startMusicOnce();

    const name = document.getElementById("nameInput").value.trim();
    const finalName = name || "kamu";

    document.getElementById("showName1").innerText = finalName;
    document.getElementById("showName2").innerText = finalName;

    nextPage();
  }

  function goNextFromVideo() {
    const video = document.getElementById("birthdayVideo");
    if (video) {
      video.pause();
    }

    if (currentPage < totalPages) {
      currentPage++;
      showPage(currentPage);
    }
  }

  function goBackFromVideo() {
    const video = document.getElementById("birthdayVideo");
    if (video) {
      video.pause();
      video.currentTime = 0;
    }
    prevPage();
  }
</script>
